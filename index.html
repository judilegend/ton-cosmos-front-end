<!doctype html>
<html lang="fr">
    <head>
        <meta charset="UTF-8" />
        <meta name="google" content="notranslate" />
        <link rel="icon" type="image/png" href="/logo.png" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        />

        <!-- ===== SEO PRIMAIRE ===== -->
        <title>Ton Cosmos — Thème Astral Personnalisé</title>
        <meta
            name="description"
            content="Découvrez votre thème astral personnalisé avec Ton Cosmos. Analyse de votre carte natale, interprétation des planètes et maisons, rapport complet livré rapidement."
        />
        <meta
            name="keywords"
            content="thème astral, carte natale, astrologie, horoscope personnalisé, natal chart, interprétation astrologique"
        />
        <meta name="author" content="Ton Cosmos" />
        <meta name="robots" content="index, follow" />
        <link rel="canonical" href="https://toncosmos.fr/" />

        <!-- ===== OPEN GRAPH (Facebook, LinkedIn, etc.) ===== -->
        <meta property="og:type" content="website" />
        <meta property="og:url" content="https://toncosmos.fr/" />
        <meta property="og:title" content="Ton Cosmos — Thème Astral Personnalisé" />
        <meta
            property="og:description"
            content="Obtenez votre thème astral complet et personnalisé. Analyse de votre carte natale, planètes, maisons et bien plus encore."
        />
        <meta property="og:image" content="https://toncosmos.fr/logo.png" />
        <meta property="og:image:alt" content="Logo Ton Cosmos" />
        <meta property="og:site_name" content="Ton Cosmos" />
        <meta property="og:locale" content="fr_FR" />

        <!-- ===== TWITTER CARD ===== -->
        <meta name="twitter:card" content="summary_large_image" />
        <meta name="twitter:url" content="https://toncosmos.fr/" />
        <meta name="twitter:title" content="Ton Cosmos — Thème Astral Personnalisé" />
        <meta
            name="twitter:description"
            content="Obtenez votre thème astral complet et personnalisé. Analyse de votre carte natale, planètes, maisons et bien plus encore."
        />
        <meta name="twitter:image" content="https://toncosmos.fr/logo.png" />

        <!-- ===== STRUCTURED DATA (JSON-LD) ===== -->
        <script type="application/ld+json">
        {
            "@context": "https://schema.org",
            "@type": "WebSite",
            "name": "Ton Cosmos",
            "url": "https://toncosmos.fr",
            "description": "Service de thème astral personnalisé basé sur votre date, heure et lieu de naissance.",
            "inLanguage": "fr",
            "potentialAction": {
                "@type": "SearchAction",
                "target": "https://toncosmos.fr/?q={search_term_string}",
                "query-input": "required name=search_term_string"
            }
        }
        </script>

        <!-- ===== PERFORMANCE & SÉCURITÉ ===== -->
        <meta name="theme-color" content="#09090b" />
        <meta name="color-scheme" content="dark" />
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
